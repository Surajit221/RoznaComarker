<div class="wam-backdrop" *ngIf="show" (click)="onBackdropClick($event)">
  <div class="wam-panel" role="dialog" aria-modal="true">

    <div class="wam-header">
      <h2 class="wam-title">Assign Worksheet</h2>
      <button class="wam-close" (click)="close()" aria-label="Close">✕</button>
    </div>

    <!-- Loading skeleton -->
    <div class="wam-loading" *ngIf="isLoading">
      <div class="skel skel-row" *ngFor="let _ of [1,2,3]"></div>
    </div>

    <ng-container *ngIf="!isLoading">
      <!-- No worksheets -->
      <p class="wam-empty" *ngIf="worksheets.length === 0">
        You have no saved worksheets yet.
        <a [routerLink]="['/worksheets/create']">Create one</a> first.
      </p>

      <!-- Worksheet list -->
      <div class="wam-form-group">
        <label class="wam-label">Select Worksheet</label>
        <ng-container *ngIf="isLoading">
          <div class="wam-loading">Loading worksheets…</div>
        </ng-container>
        <ng-container *ngIf="!isLoading && worksheets.length === 0">
          <div class="wam-empty">No worksheets available</div>
        </ng-container>
        <ng-container *ngIf="!isLoading && worksheets.length > 0">
          <select class="wam-select" [(ngModel)]="selectedId">
            <option value="">Choose a worksheet…</option>
            <option *ngFor="let ws of worksheets" [value]="ws._id">{{ ws.title }}</option>
          </select>
        </ng-container>
      </div>

      <!-- Class dropdown -->
      <ng-container *ngIf="!classId">
        <div class="wam-form-group">
          <label class="wam-label">Select Class</label>
          <ng-container *ngIf="isLoadingClasses">
            <div class="wam-loading">Loading classes…</div>
          </ng-container>
          <ng-container *ngIf="!isLoadingClasses && classes.length === 0">
            <div class="wam-empty">No classes available</div>
          </ng-container>
          <ng-container *ngIf="!isLoadingClasses && classes.length > 0">
            <select class="wam-select" [(ngModel)]="selectedClassId">
              <option value="">Choose a class…</option>
              <option *ngFor="let c of classes" [value]="c._id">{{ c.name }}</option>
            </select>
          </ng-container>
        </div>
      </ng-container>

      <!-- Actions -->
      <div class="wam-actions" *ngIf="worksheets.length > 0">
        <button class="wam-cancel" (click)="close()" [disabled]="isSubmitting">Cancel</button>
        <button
          class="wam-submit"
          (click)="submit()"
          [disabled]="isSubmitting || !selectedId || (!classId && !selectedClassId)">
          {{ isSubmitting ? 'Assigning…' : 'Assign to class' }}
        </button>
      </div>
    </ng-container>

    <!-- View all link -->
    <div class="wam-view-all-wrapper">
      <button class="wam-view-all-btn" (click)="openWorksheetLibrary()">
        <span class="wam-underline">View all worksheets</span>
        <span class="wam-arrow">→</span>
      </button>
    </div>

  </div>
</div>
