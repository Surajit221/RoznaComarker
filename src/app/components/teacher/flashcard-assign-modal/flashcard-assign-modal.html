<div class="fam-backdrop" *ngIf="show" (click)="onBackdropClick($event)">
  <div class="fam-panel" role="dialog" aria-modal="true">

    <div class="fam-header">
      <h2 class="fam-title">Assign Flashcard Set</h2>
      <button class="fam-close" (click)="close()" aria-label="Close">✕</button>
    </div>

    <!-- Error alert -->
    <div class="fam-error-alert" *ngIf="errorMessage">
      <span class="fam-error-icon">⚠</span>
      <span class="fam-error-text">{{ errorMessage }}</span>
    </div>

    <!-- Loading skeleton -->
    <div class="fam-loading" *ngIf="isLoading">
      <div class="skel skel-row" *ngFor="let _ of [1,2,3]"></div>
    </div>

    <ng-container *ngIf="!isLoading">
      <!-- No sets -->
      <p class="fam-empty" *ngIf="sets.length === 0">
        You have no flashcard sets yet.
        <a [routerLink]="['/flashcards/create']">Create one</a> first.
      </p>

      <!-- Set list -->
      <div class="fam-set-list" *ngIf="sets.length > 0">
        <div class="fam-set-item-wrapper" *ngFor="let set of sets">
          <button
            class="fam-set-item"
            [class.selected]="selectedSetId === set._id"
            (click)="selectedSetId = set._id">
            <span class="fam-set-title">{{ set.title }}</span>
            <span class="fam-set-count">{{ set.cardCount ?? set.cards?.length ?? 0 }} cards</span>
            <span class="fam-check" *ngIf="selectedSetId === set._id">✓</span>
          </button>
          <button 
            class="fam-preview-btn"
            (click)="openPreview(set)"
            [attr.aria-label]="`Preview ${set.title}`">
            👁️ Preview
          </button>
        </div>
      </div>

      <!-- Deadline picker -->
      <div class="fam-deadline" *ngIf="sets.length > 0">
        <label class="fam-label" for="fam-deadline">Deadline</label>
        <input
          id="fam-deadline"
          class="fam-input"
          type="date"
          [min]="minDate"
          [(ngModel)]="deadline"
        />
      </div>

      <!-- Actions -->
      <div class="fam-actions" *ngIf="sets.length > 0">
        <button class="fam-cancel" (click)="close()" [disabled]="isSubmitting">Cancel</button>
        <button
          class="fam-submit"
          (click)="submit()"
          [disabled]="isSubmitting || !selectedSetId || !deadline">
          {{ isSubmitting ? 'Assigning…' : 'Assign to class' }}
        </button>
      </div>
    </ng-container>

    <!-- View all link -->
    <div class="fam-view-all-wrapper">
      <button class="fam-view-all-btn" (click)="openFlashcardLibrary()">
        <span class="fam-underline">View all flashcards</span>
        <span class="fam-arrow">→</span>
      </button>
    </div>

  </div>
</div>

<!-- Flashcard Preview Modal -->
<app-flashcard-preview-modal
  [(show)]="showPreview"
  [flashcardSet]="selectedSetForPreview"
  (back)="onBackFromPreview()">
</app-flashcard-preview-modal>
