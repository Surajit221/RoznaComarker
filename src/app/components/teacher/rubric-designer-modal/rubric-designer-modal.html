<app-modal-dialog
  [open]="open"
  [maxWidthClass]="'max-w-none'"
  [panelClass]="'lg:w-[90vw]'"
  (closed)="closeDialog()"
>
  <div class="w-full flex flex-col gap-6">
    <div class="w-full flex flex-col items-center justify-center">
      <p class="text-2xl sm:text-3xl font-bold text-center text-gray-700">{{ rubricDesignerTitle }}</p>
    </div>

    <div class="w-full overflow-x-auto">
      <div class="min-w-[980px] w-full">
        <div
          class="w-full grid gap-3 items-start"
          [style.gridTemplateColumns]="'minmax(200px, 1fr) repeat(' + rubricLevels.length + ', minmax(180px, 1fr)) minmax(120px, 120px)'"
        >
          <div class="font-semibold text-gray-700">Grading Criteria</div>

          @for (lvl of rubricLevels; track $index) {
          <div class="w-full flex flex-col gap-2">
            <div class="w-full flex flex-row gap-2 items-center">
              <input type="text" class="input-text bg-white w-full" [(ngModel)]="lvl.title" placeholder="Add text here..." />
              <button
                type="button"
                class="btn-danger-sm shrink-0 hidden sm:inline-flex"
                (click)="removeRubricLevelColumn($index)"
                [disabled]="rubricLevels.length <= 1"
                aria-label="Delete rubric column"
              >
                Remove
              </button>
            </div>
            <input
              type="number"
              class="input-text bg-white text-center max-w-[90px]"
              [ngModel]="lvl.maxPoints"
              (ngModelChange)="lvl.maxPoints = coercePointsInput($event)"
              min="0"
              step="1"
              placeholder="10"
            />
          </div>
          }

          <div class="w-full flex flex-col sm:flex-row gap-2 justify-end pt-1">
            <button
              type="button"
              class="btn-danger-sm w-full sm:hidden"
              (click)="removeRubricLevelColumn(rubricLevels.length - 1)"
              [disabled]="rubricLevels.length <= 1"
              aria-label="Remove last rubric column"
            >
              Remove
            </button>
            <button
              type="button"
              class="btn-primary w-full sm:w-auto"
              (click)="addRubricLevelColumn()"
              [disabled]="rubricLevels.length >= 5"
            >
              + Add
            </button>
          </div>

          @for (row of rubricCriteriaRows; track $index) {
          <div class="w-full flex flex-col gap-2">
            <textarea
              class="w-full min-h-[140px] border-2 border-[#E7E7E7] rounded-2xl p-4 placeholder:text-[#E7E7E7] text-base font-normal focus:outline-none focus:border-[#008081] focus:shadow-[0px_4px_0_#008081]"
              [(ngModel)]="row.title"
              placeholder="Add text here..."
            ></textarea>
          </div>

          @for (cell of row.cells; track $index) {
          <textarea
            class="w-full min-h-[140px] border-2 border-[#E7E7E7] rounded-2xl p-4 placeholder:text-[#E7E7E7] text-base font-normal focus:outline-none focus:border-[#008081] focus:shadow-[0px_4px_0_#008081]"
            [(ngModel)]="row.cells[$index]"
            placeholder="Add text here..."
          ></textarea>
          }

          <div class="w-full flex items-center justify-end pt-2">
            <button
              type="button"
              class="btn-danger-sm"
              (click)="removeRubricCriteriaRow($index)"
              [disabled]="rubricCriteriaRows.length <= 1"
            >
              Remove
            </button>
          </div>
          }
        </div>
      </div>
    </div>

    <div class="sticky bottom-0 -mx-6 sm:-mx-8 px-6 sm:px-8 pt-4 pb-2 bg-white border-t border-gray-100">
      <div class="w-full flex flex-col sm:flex-row items-stretch sm:items-center justify-center gap-3 sm:gap-6">
        <div class="w-full sm:w-auto flex justify-start">
          <button type="button" class="btn-primary w-full sm:w-auto" (click)="addRubricCriteriaRow()">+ Add</button>
        </div>

        <div class="w-full sm:flex-1 flex flex-col sm:flex-row sm:flex-wrap gap-2">
          <input
            type="text"
            class="w-full sm:flex-1 sm:min-w-[220px] border-2 border-[#E7E7E7] rounded-2xl px-4 py-3 placeholder:text-[#B8B8B8] text-base font-normal focus:outline-none focus:border-[#008081] focus:shadow-[0px_4px_0_#008081]"
            [(ngModel)]="rubricPromptText"
            placeholder="Describe the rubric you want to generate..."
            [disabled]="isGenerating"
          />

          <button
            type="button"
            class="btn-info w-full sm:w-auto whitespace-nowrap sm:min-w-[140px]"
            (click)="onGenerateRubricAi()"
            [disabled]="isGenerating"
          >
            @if (isGenerating) { Generating Rubric... } @else { Generate Rubric Using AI }
          </button>
        </div>

        <input
          #rubricFileInput
          type="file"
          accept="application/vnd.openxmlformats-officedocument.wordprocessingml.document,.docx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,.xlsx"
          class="hidden"
          (change)="onRubricFileSelected($event)"
        />

        <div class="w-full sm:w-auto grid grid-cols-3 gap-2">
          <button type="button" class="btn-danger w-full" (click)="closeDialog()">Cancel</button>

          <button
            type="button"
            class="btn-primary w-full"
            [disabled]="isAttaching"
            (click)="rubricFileInput.click()"
          >
            @if (isAttaching) { Analyzing rubric file... } @else { Attach }
          </button>

          <button type="button" class="btn-primary w-full" [disabled]="isSaving" (click)="onSaveRubric()">
            @if (isSaving) { Saving... } @else { Save }
          </button>
        </div>
      </div>
    </div>
  </div>
</app-modal-dialog>
