<div class="em-backdrop" *ngIf="show"
     (click)="onBackdropClick($event)"
     role="dialog"
     aria-modal="true"
     [attr.aria-labelledby]="'em-title'"
     [attr.aria-describedby]="'em-desc'">
  <div class="em-panel">

    <!-- Solid red icon circle -->
    <div class="em-icon-circle">
      <svg class="em-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </div>

    <h2 class="em-title" id="em-title">{{ title }}</h2>
    <p class="em-message" id="em-desc">{{ message }}</p>
    <button class="em-ok-btn" (click)="close()" autofocus>OK</button>

  </div>
</div>
